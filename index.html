<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALIZARINE</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    background:black;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:120px;
    flex-wrap:wrap;
    overflow:hidden;
}

/* base logos */
.logo{
    width:220px;
    cursor:pointer;
    transition:0.3s;
}

/* ALIZARINE = simple hover glitch */
.aliza:hover{
    animation:glitch 0.15s infinite;
    filter:
    drop-shadow(3px 0 #ff0000)
    drop-shadow(-3px 0 #00ffff)
    drop-shadow(0 0 20px #ff0000);
    transform:scale(1.05);
}

/* FEST = pulse (celui que tu aimes) */
.fest:hover{
    animation:pulse 0.8s infinite;
    filter:
    drop-shadow(0 0 20px #ff0000);
    transform:scale(1.08);
}

/* glitch */
@keyframes glitch{
    0%{transform:translate(0);}
    20%{transform:translate(-2px,2px);}
    40%{transform:translate(2px,-2px);}
    60%{transform:translate(-2px,-2px);}
    80%{transform:translate(2px,2px);}
    100%{transform:translate(0);}
}

/* pulse FEST */
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.12);}
    100%{transform:scale(1);}
}
</style>

</head>

<body>

<!-- ALIZARINE -->
<a href="home.html">
    <img src="logo.png" class="logo aliza">
</a>

<!-- FEST -->
<a href="fest.html">
    <img src="fest.png" class="logo fest">
</a>

</body>
</html>
