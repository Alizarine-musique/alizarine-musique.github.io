<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Les Projets</title>

<style>
body{
    margin:0;
    background:black;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:180px;
    flex-wrap:wrap;
}

/* LOGOS PLUS GROS */
.logo.aliza{
    width:320px;
    max-width:85vw;
    cursor:pointer;
    transition:0.25s ease;
    filter:contrast(120%) brightness(1);
}

/* ALIZARINE = glitch */
.aliza:hover{
    animation:glitch 0.15s infinite;
    filter:
    drop-shadow(3px 0 #ff0000)
    drop-shadow(-3px 0 #00ffff)
    drop-shadow(0 0 35px #ff0000);
    transform:scale(1.08);
}

/* FEST = pulse */
.fest:hover{
    animation:pulse 0.75s infinite;
    filter:
    drop-shadow(0 0 40px #ff0000);
    transform:scale(1.12);
}

/* GLITCH */
@keyframes glitch{
    0%{transform:translate(0);}
    20%{transform:translate(-3px,2px);}
    40%{transform:translate(3px,-2px);}
    60%{transform:translate(-2px,-2px);}
    80%{transform:translate(2px,2px);}
    100%{transform:translate(0);}
}

/* PULSE FEST */
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.18);}
    100%{transform:scale(1);}
}
    /* Version téléphone*/
@media (max-width: 768px){

    body{
        flex-direction:column;
        gap:40px; /* <-- ICI on réduit l’espace */
    }

    .logo.aliza{
        width:260px; /* logos plus adaptés mobile */
    }
}
</style>

</head>

<div style="position:absolute;top:40px;color:#fff;letter-spacing:4px;font-family:Arial;">
FAIS TON CHOIX
</div>

<body>

<!-- ALIZARINE -->
<a href="groupe.html">
    <img src="logo.png" class="logo aliza">
</a>

<!-- FEST -->
<a href="fest.html">
    <img src="logo-fest.png" class="logo fest">
</a>

</body>

</html>
