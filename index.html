<!DOCTYPE html>
    <html lang="fr">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Les Projets</title>
                <style>
                    body{
                        margin:0;
                        background:black;
                        height:100vh;
                        display:flex;
                        justify-content:center;
                        align-items:center;
                        gap:140px;
                        flex-wrap:wrap;
                        overflow:hidden;
                    }
                    .title{
                        position:absolute;
                        top:40px;
                        color:white;
                        letter-spacing:4px;
                        font-family:Arial;
                    }

                    .logo{
                        width:320px;
                        max-width:80vw;
                        cursor:pointer;
                        transition:0.25s ease;
                    }
/* ALIZARINE */
                    .logo.aliza:hover{
                        animation:glitch 0.15s infinite;
                        filter:
                        drop-shadow(3px 0 #00fff2)
                        drop-shadow(-3px 0 #15ff00)
                        drop-shadow(0 0 35px #15ff00);
                        transform:scale(1.08);
                    }
/* FEST */
                    .logo.fest:hover{
                        animation:pulse 0.75s infinite;
                        filter:
                        drop-shadow(0 0 40px #ff0000);
                        transform:scale(1.12);
                    }
/* GLITCH */
                    @keyframes glitch{
                        0%{transform:translate(0);}
                        20%{transform:translate(-3px,2px);}
                        40%{transform:translate(3px,-2px);}
                        60%{transform:translate(-2px,-2px);}
                        80%{transform:translate(2px,2px);}
                        100%{transform:translate(0);}
                    }
/* PULSE */
                    @keyframes pulse{
                        0%{transform:scale(1);}
                        50%{transform:scale(1.18);}
                        100%{transform:scale(1);}
                    }
/* MOBILE */
                    @media (max-width:768px){
                        body{
                            flex-direction:column;
                            gap:40px;
                        }
                        .logo{
                            width:240px;
                        }
                    }
                </style>
        </head>

    <body>
        <div class="title">
            FAIS TON CHOIX
        </div>
        <a href="alizarine/concerts.html">
            <img src="image/logo.png" class="logo aliza">
        </a>
        <a href="aliza'fest/bio.html">
            <img src="image/logo-fest.png" class="logo fest">
        </a>
    </body>
</html>
