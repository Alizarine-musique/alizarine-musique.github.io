<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALIZARINE</title>

<style>
body{
    margin:0;
    background:black;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:120px;
    flex-wrap:wrap;
    font-family:Arial, sans-serif;
}

/* logos */
.logo{
    width:220px;
    cursor:pointer;
    transition:0.2s;
    filter:grayscale(100%) contrast(150%);
}

/* ALIZARINE = agressif simple */
.aliza:hover{
    transform:scale(1.05) rotate(-2deg);
    filter:contrast(200%) brightness(1.2);
}

/* FEST = énergie punk */
.fest:hover{
    transform:scale(1.1) rotate(2deg);
    filter:contrast(200%) brightness(1.4);
}

/* effet “photocopie sale” */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 2px,
        transparent 3px
    );
    pointer-events:none;
    mix-blend-mode:overlay;
}
</style>

</head>

<body>

<a href="home.html">
    <img src="logo.png" class="logo aliza">
</a>

<a href="fest.html">
    <img src="logo-fest.png" class="logo fest">
</a>

</body>
</html>
